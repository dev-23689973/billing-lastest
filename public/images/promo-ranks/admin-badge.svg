<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 50" fill="none" role="img" aria-label="Admin">
  <defs>
    <linearGradient id="a-bg" x1="0" y1="25" x2="250" y2="25" gradientUnits="userSpaceOnUse">
      <stop stop-color="#070D1A"/>
      <stop offset="0.22" stop-color="#0C1528"/>
      <stop offset="0.5" stop-color="#101D35"/>
      <stop offset="0.78" stop-color="#0C1528"/>
      <stop offset="1" stop-color="#070D1A"/>
    </linearGradient>
    <linearGradient id="a-rim" x1="0" y1="0" x2="250" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0891B2" stop-opacity="0.15"/>
      <stop offset="0.2" stop-color="#22D3EE" stop-opacity="0.95"/>
      <stop offset="0.5" stop-color="#A5F3FC"/>
      <stop offset="0.8" stop-color="#22D3EE" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#0891B2" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="a-gold" x1="125" y1="8" x2="125" y2="18" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FEF3C7"/>
      <stop offset="0.45" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#B45309"/>
    </linearGradient>
    <linearGradient id="a-inf" x1="88" y1="25" x2="162" y2="25" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE"/>
      <stop offset="0.5" stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <radialGradient id="a-halo" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(125 27) scale(42 14)">
      <stop stop-color="#22D3EE" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <filter id="a-glow" x="-30%" y="-50%" width="160%" height="200%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- capsule -->
  <rect x="1" y="4" width="248" height="42" rx="21" fill="url(#a-bg)" stroke="url(#a-rim)" stroke-width="1.1"/>
  <rect x="5.5" y="8.5" width="239" height="33" rx="16.5" stroke="#22D3EE" stroke-opacity="0.08"/>

  <!-- five-slot structure (same width as 5 rank icons) -->
  <g stroke="#22D3EE" stroke-opacity="0.07" stroke-width="0.75">
    <line x1="50" y1="11" x2="50" y2="39"/>
    <line x1="100" y1="11" x2="100" y2="39"/>
    <line x1="150" y1="11" x2="150" y2="39"/>
    <line x1="200" y1="11" x2="200" y2="39"/>
  </g>

  <!-- wing accents -->
  <path d="M26 25L34 19V31Z" fill="#22D3EE" fill-opacity="0.12"/>
  <path d="M224 25L216 19V31Z" fill="#22D3EE" fill-opacity="0.12"/>

  <!-- center halo -->
  <ellipse cx="125" cy="27" rx="46" ry="15" fill="url(#a-halo)"/>

  <!-- infinity (bold, dominant) -->
  <path
    d="M125 30.5C112 20.5 97 20.5 97 30.5C97 40.5 112 40.5 125 30.5C138 20.5 153 20.5 153 30.5C153 40.5 138 40.5 125 30.5Z"
    stroke="url(#a-inf)"
    stroke-width="3.4"
    stroke-linecap="round"
    filter="url(#a-glow)"
  />

  <!-- crown (compact, readable) -->
  <g transform="translate(125 12.5)">
    <path d="M-10.5 6.5H10.5L8.5 2.2L4.8 5.2L0 0.8L-4.8 5.2L-8.5 2.2Z" fill="url(#a-gold)"/>
    <rect x="-10.5" y="6.5" width="21" height="2.4" rx="1.1" fill="url(#a-gold)"/>
    <circle cx="0" cy="0.8" r="1" fill="#FFFBEB"/>
  </g>

  <!-- end caps -->
  <circle cx="14" cy="25" r="1.6" fill="#22D3EE" fill-opacity="0.35"/>
  <circle cx="236" cy="25" r="1.6" fill="#22D3EE" fill-opacity="0.35"/>
</svg>
